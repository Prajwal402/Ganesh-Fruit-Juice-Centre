<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment — Ganesh Fresh Juice Centre</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --pri: #E67E22;
            --pri-dk: #D35400;
            --pri-lt: #FDEBD0;
            --sec: #1ABC9C;
            --sec-dk: #16A085;
            --acc: #E74C8B;
            --bg: #FFF9F0;
            --bg-dk: #1A1A2E;
            --txt: #2C3E50;
            --txt-lt: #7F8C8D;
            --fh: 'Poppins', sans-serif;
            --fb: 'Inter', sans-serif;
            --r: 24px;
            --rs: 12px;
            --sh: 0 10px 40px rgba(0, 0, 0, 0.1);
            --ez: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--fb);
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF9F0 0%, #FFF3E0 100%);
        }

        .pay-container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: var(--r);
            box-shadow: var(--sh);
            overflow: hidden;
            animation: slideUp 0.6s var(--ez);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pay-header {
            background: linear-gradient(135deg, #5B2D8E, #3D1E63);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .pay-header h1 {
            font: 800 1.5rem var(--fh);
            margin-bottom: 5px;
        }

        .order-tag {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 999px;
            font: 600 0.85rem var(--fh);
            display: inline-block;
        }

        .amount-card {
            padding: 24px;
            text-align: center;
            border-bottom: 1px dashed #eee;
        }

        .amount-label {
            font-size: 0.9rem;
            color: var(--txt-lt);
            font-weight: 500;
        }

        .amount-value {
            font: 800 2.5rem var(--fh);
            color: var(--txt);
            margin: 5px 0;
        }

        .breakdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--txt-lt);
        }

        .breakdown span strong {
            color: var(--txt);
        }

        .pay-body {
            padding: 24px;
        }

        .btn-direct {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: #5B2D8E;
            color: #fff;
            text-decoration: none;
            border-radius: var(--rs);
            font: 700 1rem var(--fh);
            box-shadow: 0 6px 20px rgba(91, 45, 142, 0.25);
            transition: all 0.3s var(--ez);
            margin-bottom: 24px;
        }

        .btn-direct:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(91, 45, 142, 0.35);
        }

        .section-title {
            font: 700 0.9rem var(--fh);
            color: var(--txt-lt);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .app-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: var(--rs);
            text-decoration: none;
            color: var(--txt);
            font: 600 0.9rem var(--fh);
            transition: all 0.3s;
        }

        .app-btn:hover {
            border-color: #5B2D8E;
            background: #fbf9ff;
        }

        .qr-wrap {
            background: #f9f9f9;
            border-radius: var(--rs);
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .qr-wrap img {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            background: #fff;
            padding: 10px;
            border: 1px solid #eee;
        }

        .qr-text {
            font-size: 0.85rem;
            color: var(--txt-lt);
            margin-top: 10px;
        }

        .upi-id-box {
            background: #f0f0f0;
            border-radius: var(--rs);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .upi-id-box span {
            font: 700 0.85rem var(--fb);
            color: #555;
        }

        .btn-copy {
            background: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font: 700 0.75rem var(--fh);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .verify-box {
            background: #fff;
            border: 2px solid #5B2D8E;
            border-radius: var(--rs);
            padding: 20px;
            margin-bottom: 20px;
        }

        .verify-box label {
            display: block;
            font: 700 0.85rem var(--fh);
            margin-bottom: 8px;
            color: var(--txt);
        }

        .txn-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font: 700 1rem var(--fb);
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }

        .txn-input:focus {
            outline: none;
            border-color: #5B2D8E;
        }

        .btn-verify {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #27AE60, #2ECC71);
            color: #fff;
            border: none;
            border-radius: 8px;
            font: 700 1rem var(--fh);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.25);
            transition: all 0.3s;
        }

        .btn-verify:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.35);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            margin-top: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        .status-msg.pending {
            color: #E67E22;
        }

        .status-msg.success {
            color: #27AE60;
        }

        .status-msg.error {
            color: #E74C3C;
        }

        .pay-footer {
            padding: 20px 24px;
            background: #fcfcfc;
            display: flex;
            gap: 10px;
        }

        .btn-back {
            flex: 1;
            padding: 12px;
            border: none;
            background: #eee;
            color: var(--txt);
            border-radius: 8px;
            font: 700 0.9rem var(--fh);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            background: #FFEBEE;
            color: #C62828;
            border-radius: 8px;
            font: 700 0.9rem var(--fh);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #FFCDD2;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .pay-container {
                border-radius: 0;
                min-height: 100vh;
            }

            .amount-value {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="pay-container">
        <div class="pay-header">
            <div class="order-tag" id="orderIdDisp">Order: GFJ-XXXX</div>
            <h1>📱 Complete Payment</h1>
        </div>

        <div class="amount-card">
            <div class="amount-label">Grand Total</div>
            <div class="amount-value" id="totalDisp">₹0</div>
            <div class="breakdown">
                <span>Subtotal: <strong id="subtotalDisp">₹0</strong></span>
                <span>Delivery: <strong id="deliveryDisp">₹0</strong></span>
            </div>
        </div>

        <div class="pay-body">
            <a href="#" class="btn-direct" id="payAnyBtn">📱 Open UPI App to Pay</a>

            <div class="section-title">📲 Or Select App</div>
            <div class="apps-grid">
                <a href="#" class="app-btn" data-app="tez://">💳 GPay</a>
                <a href="#" class="app-btn" data-app="phonepe://">📲 PhonePe</a>
                <a href="#" class="app-btn" data-app="paytmmp://">💰 Paytm</a>
                <a href="#" class="app-btn" data-app="upi://">🏦 BHIM</a>
            </div>

            <div class="qr-wrap">
                <div class="section-title">Scan QR Code</div>
                <img src="qrcode.jpg" alt="UPI QR">
                <div class="qr-text">Scan with any UPI app</div>
            </div>

            <div class="upi-id-box">
                <span id="upiIdText">jnaneshappu85-2@okicici</span>
                <button class="btn-copy" id="copyBtn">📋 Copy</button>
            </div>

            <div class="verify-box">
                <label for="txnId">📝 Transaction ID / UTR</label>
                <input type="text" id="txnId" class="txn-input" placeholder="Enter 12-digit UPI Ref No."
                    autocomplete="off">
                <button class="btn-verify" id="verifyBtn">✅ Verify & Confirm Order</button>
                <div id="statusMsg" class="status-msg pending">⏳ Complete payment to proceed</div>
            </div>
        </div>

        <div class="pay-footer">
            <button class="btn-back" id="backBtn">🔙 Back to Menu</button>
            <button class="btn-cancel" id="cancelBtn">✖ Cancel</button>
        </div>
    </div>

    <script shadow="false">
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const orderId = params.get('order');
        const total = params.get('total');
        const sub = params.get('sub');
        const del = params.get('del');
        const UPI_ID = 'jnaneshappu85-2@okicici';

        if (!token || !orderId) {
            alert('Missing order session. Redirecting to menu...');
            window.location.href = '/';
        }

        // Initialize display
        document.getElementById('orderIdDisp').textContent = `Order: ${orderId}`;
        document.getElementById('totalDisp').textContent = `₹${total}`;
        document.getElementById('subtotalDisp').textContent = `₹${sub}`;
        document.getElementById('deliveryDisp').textContent = `₹${del}`;

        function buildUpiUrl(appScheme = 'upi://') {
            const amtStr = Number(total).toFixed(2);
            return `${appScheme}pay?pa=${encodeURIComponent(UPI_ID)}&pn=${encodeURIComponent('JNANESHA C M')}&am=${amtStr}&cu=INR&tr=${encodeURIComponent(orderId)}&tn=${encodeURIComponent('Order ' + orderId + ' at Ganesh Juice')}`;
        }

        document.getElementById('payAnyBtn').href = buildUpiUrl();
        document.querySelectorAll('.app-btn').forEach(btn => {
            btn.href = buildUpiUrl(btn.dataset.app);
        });

        // Copy UPI ID
        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(UPI_ID).then(() => {
                document.getElementById('copyBtn').textContent = '✓ Copied';
                setTimeout(() => document.getElementById('copyBtn').textContent = '📋 Copy', 1500);
            });
        };

        // Verification
        const verifyBtn = document.getElementById('verifyBtn');
        const statusMsg = document.getElementById('statusMsg');
        const txnInput = document.getElementById('txnId');

        verifyBtn.onclick = async () => {
            const txnId = txnInput.value.trim();
            if (txnId.length < 3) {
                alert('Please enter a valid transaction ID');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = '🔄 Verifying...';
            statusMsg.textContent = '🔄 Verifying payment with server...';

            try {
                const resp = await fetch('/api/payment/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentToken: token, transactionId: txnId })
                });
                const data = await resp.json();

                if (resp.ok && data.success) {
                    statusMsg.className = 'status-msg success';
                    statusMsg.textContent = '✅ Payment Verified! Success.';
                    verifyBtn.textContent = '✅ Success!';

                    // Show confirmation and redirect
                    setTimeout(() => {
                        alert('Order Confirmed! Redirecting to home...');
                        window.location.href = '/';
                    }, 2000);
                } else {
                    statusMsg.className = 'status-msg error';
                    statusMsg.textContent = `❌ ${data.error || 'Verification failed'}`;
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = '🔄 Retry Verification';
                }
            } catch (err) {
                statusMsg.className = 'status-msg error';
                statusMsg.textContent = '❌ Connection error. Try again.';
                verifyBtn.disabled = false;
                verifyBtn.textContent = '🔄 Retry Verification';
            }
        };

        document.getElementById('backBtn').onclick = () => {
            if (confirm('Go back to menu? Your order progress will be saved in the cart.')) {
                window.location.href = '/';
            }
        };

        document.getElementById('cancelBtn').onclick = () => {
            if (confirm('Cancel this payment? You can always create a new order later.')) {
                window.location.href = '/';
            }
        };
    </script>
</body>

</html>
